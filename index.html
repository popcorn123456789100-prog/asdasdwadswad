<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8">
<title>Unity WebGL Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- allow browser caching -->

<meta http-equiv="Cache-Control" content="public, max-age=31536000">

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:Arial;
}

#unity-container{
  position:relative;
}

#unity-canvas{
  width:640px;
  height:400px;
  background:black;
}

#loading{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
}
</style>

</head>

<body>

<div id="unity-container">
<canvas id="unity-canvas"></canvas>
<div id="loading">Loading Game...</div>
</div>

<script>
const canvas = document.getElementById("unity-canvas");
const loadingText = document.getElementById("loading");

const config = {
  dataUrl: "Build/w-pt.data.unityweb",
  frameworkUrl: "Build/w-pt.framework.js.unityweb",
  codeUrl: "Build/w-pt.wasm.unityweb",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "Game",
  productName: "Silksong Web",
  productVersion: "1.0"
};

const script = document.createElement("script");
script.src = "Build/w-pt.loader.js";

script.onload = () => {
  createUnityInstance(canvas, config, (progress)=>{
      loadingText.innerText = "Loading: " + Math.round(progress*100) + "%";
  }).then(()=>{
      loadingText.style.display="none";
  }).catch((err)=>{
      console.error(err);
      loadingText.innerText="Failed to load game";
  });
};

document.body.appendChild(script);
</script>

</body>
</html>
